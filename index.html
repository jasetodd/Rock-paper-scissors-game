<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <title>RPS Game</title>
  </head>
  <body>
    <main>
      <header>
        <h1 class="header">Rock paper scissors game</h1>
        <div class="scores">
          <p>Your score is: <span class="pScore">0</span></p>
          <p>Computer score is: <span class="cScore">0</span></p>
        </div>
      </header>

      <section class="buttons">
        <button class="rock button">Rock</button>
        <button class="paper button">Paper</button>
        <button class="scissors button">Scissors</button>
      </section>
      <div class="winOrLose"></div>
    </main>
    <script src="javascript.js"></script>
  </body>
</html>
